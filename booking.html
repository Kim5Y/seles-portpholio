<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Booking/main-booking.css">
    <link rel="shortcut icon" href="images/icons/mylogo-white1.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" />
    <title>booking | OphycialScecher</title>
</head>

<body>
    <main>
        <div class="wrapper">
            <h1>BOOK NOW</h1>
            <div class="input-info-div">
                <div class="input-logo-div">
                    <img src="images/icons/mylogo-white1.png" srcset="">
                </div>
                <form id="booking-form">
                    <div class="input-container">
                        <input type="text" id="input" name="firstName" placeholder=" " required>
                        <label for="input" class="placeholder">FirstName</label>
                    </div>
                    <div class="input-container">
                        <input type="text" id="input" name="lastName" placeholder=" " required>
                        <label for="input" class="placeholder">LastName</label>
                    </div>
                    <div class="input-container">
                        <input type="text" id="input" name="email" placeholder=" " required>
                        <label for="input" class="placeholder">Email</label>
                    </div>
                    <div class="input-container dateAndTime">
                        <input type="date" id="date" name="date" required>
                        <input type="submit" id="button" value="BOOK NOW">
                    </div>

                </form>

            </div>
        </div>
    </main>
    <footer>
        <div class="copyRight-txt">
            <img src="images/icons/facebook.svg" alt="" srcset="">
            <img src="images/icons/instagram.svg" alt="" srcset="">
            <img src="images/icons/linkedin.svg" alt="" srcset="">
            <img src="images/icons/pinterest.svg" alt="" srcset="">
        </div>
        <p>&#xA9 2024 Ophycial Lense Photography. All Right Reserved.</p>
        </div>
    </footer>
    <script defer src="Booking/main-booking.js"></script>
</body>

</html>
